<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentScriptType="application/ecmascript" contentStyleType="text/css" height="600px" preserveAspectRatio="none" style="width:900px;height:600px;background:#FEFEFE;" version="1.1" viewBox="0 0 900 600" width="900px" zoomAndPan="magnify">
  <defs>
    <style type="text/css">
      <![CDATA[
        text { font-family: monospace; }
        .actor { fill: #CCCCCC; stroke: #666666; }
        .participant { fill: #E8F4FF; stroke: #0066CC; }
        .message { stroke: #666666; }
        .data { fill: #FFF3E6; stroke: #FF9900; }
      ]]>
    </style>
  </defs>
  
  <text x="450" y="30" text-anchor="middle" font-size="16" font-weight="bold">
    End-to-End Workflow: Deal + Audience Validation
  </text>
  
  <circle class="actor" r="25" cx="100" cy="80"/>
  <text x="100" y="85" text-anchor="middle" font-size="11">Planner</text>
  
  <rect class="participant" height="40" width="120" x="200" y="60"/>
  <text x="260" y="85" text-anchor="middle" font-size="11">Buyer Agent</text>
  
  <rect class="participant" height="40" width="140" x="380" y="60"/>
  <text x="450" y="85" text-anchor="middle" font-size="11">Agentic Direct</text>
  
  <rect class="participant" height="40" width="120" x="580" y="60"/>
  <text x="640" y="85" text-anchor="middle" font-size="11">Seller Agent</text>
  
  <rect class="data" height="40" width="140" x="720" y="60"/>
  <text x="790" y="85" text-anchor="middle" font-size="11">UCP/Audiences</text>
  
  <!-- Flow lines -->
  <line class="message" x1="100" y1="130" x2="260" y2="160" stroke-dasharray="5,5"/>
  <text x="150" y="140" font-size="10" fill="#666">1. Campaign brief</text>
  
  <line class="message" x1="260" y1="190" x2="450" y2="220" stroke-dasharray="5,5"/>
  <text x="300" y="200" font-size="10" fill="#666">2. Discover inventory</text>
  
  <line class="message" x1="450" y1="250" x2="640" y2="280"/>
  <text x="500" y="260" font-size="10" fill="#666">3. Query products</text>
  
  <line class="message" x1="640" y1="310" x2="450" y2="340"/>
  <text x="580" y="320" font-size="10" fill="#666">4. Candidate products</text>
  
  <line class="message" x1="260" y1="370" x2="790" y2="400"/>
  <text x="400" y="385" font-size="10" fill="#666">5. Share audience embedding</text>
  
  <line class="message" x1="790" y1="430" x2="640" y2="460"/>
  <text x="700" y="440" font-size="10" fill="#666">6. Validate</text>
  
  <line class="message" x1="260" y1="490" x2="450" y2="520"/>
  <text x="300" y="500" font-size="10" fill="#666">7. Create deal</text>
  
  <line class="message" x1="450" y1="550" x2="260" y2="580"/>
  <text x="330" y="560" font-size="10" fill="#666">8. Deal ID + confirmation</text>
  
  <text x="450" y="600" text-anchor="middle" font-size="11" fill="#999">
    ⚠️ SVG rendering in progress via GitHub Actions
  </text>
</svg>
